<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin - Multi‑upload & Manage Items (ImgBB)</title>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-firestore-compat.js"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css">
  <style>
    * { box-sizing: border-box; font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif; margin: 0; }
    body { background: #f4f7fb; padding: 25px 20px; display: flex; flex-direction: column; align-items: center; }
    .container { max-width: 1400px; width: 100%; }

    .panel { background: white; border-radius: 28px; padding: 28px 30px; box-shadow: 0 12px 30px rgba(0,0,0,0.05); margin-bottom: 40px; }
    h2 { display: flex; align-items: center; gap: 8px; font-weight: 600; font-size: 1.8rem; letter-spacing: -0.3px; color: #1a2639; margin-top: 0; margin-bottom: 24px; border-left: 7px solid #2a7f62; padding-left: 18px; }
    h2 i { color: #2a7f62; font-size: 1.8rem; }

    .flex-row { display: flex; gap: 25px; flex-wrap: wrap; }
    .paste-section { flex: 2; min-width: 320px; }
    .paste-section textarea { width: 100%; padding: 16px; border: 1px solid #dde2e9; border-radius: 18px; font-size: 0.95rem; background: #f9fbfd; resize: vertical; margin-bottom: 18px; transition: 0.15s; }
    .paste-section textarea:focus { border-color: #2a7f62; outline: none; background: white; box-shadow: 0 0 0 3px rgba(42,127,98,0.15); }

    .file-section { flex: 1.2; min-width: 260px; background: #f2f6fa; border-radius: 24px; padding: 22px 20px; border: 1px dashed #a0b8cc; }
    .file-section label { font-weight: 600; color: #1f3a4b; display: block; margin-bottom: 12px; font-size: 1.1rem; }
    .file-section input[type="file"] { background: white; padding: 12px; border-radius: 40px; width: 100%; border: 1px solid #b8c9da; margin-bottom: 20px; }
    .file-note { font-size: 0.85rem; color: #3d5969; background: #e6edf3; border-radius: 40px; padding: 8px 16px; display: inline-block; }

    .action-bar { display: flex; flex-wrap: wrap; justify-content: space-between; align-items: center; margin-top: 25px; }
    .btn { background: white; border: 1px solid #b3c7da; padding: 12px 28px; border-radius: 50px; font-weight: 600; font-size: 1rem; cursor: pointer; transition: 0.15s; display: inline-flex; align-items: center; gap: 9px; box-shadow: 0 2px 6px rgba(0,0,0,0.02); }
    .btn-primary { background: #1e3f3c; border: 1px solid #1e3f3c; color: white; box-shadow: 0 8px 16px -6px rgba(30,63,60,0.3); }
    .btn-primary i { color: white; }
    .btn-primary:hover { background: #14302d; border-color: #14302d; }
    .btn-outline { background: white; color: #1f3a4b; }
    .btn-outline:hover { background: #e2ecf5; border-color: #8ba5c0; }
    .btn-danger { background: #ffeae9; border-color: #dcb4b2; color: #aa3f3a; }
    .btn-danger:hover { background: #ffdbd8; }

    .badge { background: #2a7f62; color: white; border-radius: 50px; padding: 4px 14px; font-size: 0.8rem; font-weight: 500; margin-left: 12px; }

    .items-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(280px, 1fr)); gap: 22px; margin-top: 22px; }
    .product-card { background: white; border-radius: 26px; padding: 16px 16px 18px 16px; box-shadow: 0 8px 20px rgba(0,0,0,0.02); border: 1px solid #e3eaf0; transition: 0.15s; position: relative; }
    .product-card:hover { box-shadow: 0 16px 28px rgba(0,0,0,0.06); border-color: #cbdae6; }
    .card-select { position: absolute; top: 18px; left: 18px; z-index: 7; }
    .card-select input[type="checkbox"] { width: 22px; height: 22px; cursor: pointer; accent-color: #2a7f62; border-radius: 8px; }
    .product-img { width: 100%; height: 180px; object-fit: cover; border-radius: 18px; background: #f0f4f9; margin-bottom: 8px; border: 1px solid #dee8f0; }
    .thumbnail-strip { display: flex; gap: 6px; margin: 8px 0; flex-wrap: wrap; }
    .thumb { width: 40px; height: 40px; border-radius: 8px; object-fit: cover; border: 2px solid transparent; cursor: pointer; }
    .thumb:hover { border-color: #2a7f62; }
    .product-title { font-weight: 600; font-size: 1rem; color: #1e2e3d; margin: 8px 0 4px; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }
    .product-price { font-weight: 700; font-size: 1.35rem; color: #1f4e3d; }
    .product-price small { font-weight: 400; font-size: 0.85rem; color: #687d8f; }
    .product-discount { background: #d64f44; color: white; font-size: 0.75rem; font-weight: 600; padding: 4px 10px; border-radius: 40px; display: inline-block; margin: 8px 0 4px; }
    .product-link { font-size: 0.75rem; word-break: break-all; color: #2d6f9c; background: #eaf1f9; padding: 8px 12px; border-radius: 30px; margin: 12px 0 6px; }
    .card-actions { display: flex; gap: 10px; margin-top: 10px; }
    .edit-btn, .delete-single, .add-images-btn { background: white; border: 1px solid #cbd6e2; border-radius: 40px; padding: 8px 15px; font-size: 0.8rem; cursor: pointer; transition: 0.1s; }
    .edit-btn:hover, .delete-single:hover, .add-images-btn:hover { background: #e9f0f7; }

    .selection-toolbar { background: #1a2b36; color: white; border-radius: 60px; padding: 12px 25px; display: inline-flex; gap: 20px; align-items: center; flex-wrap: wrap; margin-bottom: 20px; }
    .selection-toolbar span { font-weight: 500; }
    .selection-toolbar .btn-white { background: white; color: #1a2b36; border: none; }
    .hidden { display: none !important; }
    i { color: #4a617c; }
    .btn i { color: inherit; }
    .image-count { background: #2a7f62; color: white; border-radius: 30px; padding: 2px 8px; font-size: 0.7rem; margin-left: 6px; }

    /* progress bar */
    .upload-progress-wrap { width: 100%; margin-top: 14px; display: none; }
    .upload-progress-wrap.visible { display: block; }
    .progress-track { background: #e2eaf2; border-radius: 40px; height: 12px; overflow: hidden; }
    .progress-fill { height: 100%; background: linear-gradient(90deg, #2a7f62, #3db88a); border-radius: 40px; width: 0%; transition: width 0.2s ease; }
    .progress-label { font-size: 0.82rem; color: #4a6478; margin-top: 6px; display: flex; justify-content: space-between; }
    .progress-speed { font-size: 0.78rem; color: #7a94a8; margin-top: 3px; }

    /* modal progress */
    .modal-progress-wrap { width: 100%; margin: 10px 0; display: none; }
    .modal-progress-wrap.visible { display: block; }
  </style>
</head>
<body>
<div class="container">

  <!-- UPLOAD PANEL -->
  <div class="panel">
    <h2><i class="fas fa-cloud-upload-alt"></i> Upload product with multiple photos</h2>
    <div class="flex-row">
      <div class="paste-section">
        <textarea id="pasteText" rows="5" placeholder="Paste AliExpress product text (USD, %, link automatically extracted)&#10;Example: Trendy sneakers USD 24.50 30% off https://s.click.aliexpress.com/abc">Trendy sneakers USD 24.50 30% off https://s.click.aliexpress.com/abc</textarea>
        <p style="color:#3b5c74;margin:8px 0 0 10px;"><i class="fas fa-info-circle"></i> Price (USD), discount (%), link are extracted.</p>
      </div>
      <div class="file-section">
        <label><i class="fas fa-images"></i> Select multiple photos for ONE product</label>
        <input type="file" id="imageFiles" accept="image/*" multiple>
        <div class="file-note"><i class="far fa-check-circle"></i> All selected images will be grouped into ONE product with gallery view</div>
      </div>
    </div>
    <div class="action-bar">
      <button class="btn btn-primary" id="addMultiItemBtn"><i class="fas fa-plus-circle"></i> Create product with all images</button>
      <span id="uploadStatus" style="color:#2a7f62; font-weight:500;"></span>
    </div>
    <div class="upload-progress-wrap" id="progressWrap">
      <div class="progress-track"><div class="progress-fill" id="progressFill"></div></div>
      <div class="progress-label">
        <span id="progressText">Uploading...</span>
        <span id="progressPct">0%</span>
      </div>
      <div class="progress-speed" id="progressSpeed"></div>
    </div>
  </div>

  <!-- MANAGE PANEL -->
  <div class="panel" style="padding-top: 20px;">
    <div style="display: flex; align-items: center; justify-content: space-between; flex-wrap: wrap; gap: 15px; margin-bottom: 20px;">
      <h2 style="margin-bottom:0;"><i class="fas fa-clipboard-list"></i> Manage posted products</h2>
      <div id="selectionToolbar" class="selection-toolbar hidden">
        <span><span id="selectedCount">0</span> selected</span>
        <button class="btn btn-white" id="editSelectedBtn"><i class="fas fa-pen"></i> Edit (first)</button>
        <button class="btn btn-white" id="deleteSelectedBtn"><i class="fas fa-trash-alt"></i> Delete</button>
        <button class="btn btn-white" id="clearSelectionBtn"><i class="fas fa-times"></i> Clear</button>
      </div>
      <button class="btn btn-outline" id="refreshList"><i class="fas fa-sync-alt"></i> Refresh list</button>
    </div>
    <div id="itemsContainer" class="items-grid">
      <div style="grid-column:1/-1; text-align:center; padding: 40px; color:#6f8a9f;">Loading items...</div>
    </div>
  </div>
</div>

<!-- Modal for adding more images -->
<div id="imageModal" style="display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.8); z-index:1000; justify-content:center; align-items:center;">
  <div style="background:white; border-radius:30px; padding:30px; max-width:500px; width:90%;">
    <h3 style="margin-bottom:20px;"><i class="fas fa-images"></i> Add more images to product</h3>
    <input type="file" id="modalImageFiles" accept="image/*" multiple style="margin-bottom:14px; padding:10px; border:1px dashed #ccc; border-radius:10px; width:100%;">
    <div class="modal-progress-wrap" id="modalProgressWrap">
      <div class="progress-track"><div class="progress-fill" id="modalProgressFill"></div></div>
      <div class="progress-label">
        <span id="modalProgressText">Uploading...</span>
        <span id="modalProgressPct">0%</span>
      </div>
      <div class="progress-speed" id="modalProgressSpeed"></div>
    </div>
    <div style="display:flex; gap:10px; justify-content:flex-end; margin-top:16px;">
      <button class="btn" id="closeModalBtn">Cancel</button>
      <button class="btn btn-primary" id="saveModalBtn">Upload Images</button>
    </div>
  </div>
</div>

<script>
(function() {
  // ---- Firebase config ----
  const firebaseConfig = {
    apiKey: "AIzaSyC23iQpw8dvOamO5FpcrWWlgTwJ8gvmuM4",
    authDomain: "reconnect-10733.firebaseapp.com",
    projectId: "reconnect-10733",
    messagingSenderId: "902709752297",
    appId: "1:902709752297:web:b89e694688d25472ac1b78"
  };
  firebase.initializeApp(firebaseConfig);
  const db = firebase.firestore();

  const imgbbApiKey = "19c4f7201834438080bb09c81999d75c";

  // ================================================================
  // IN-MEMORY IMAGE SRC CACHE
  // Prevents re-fetching already-loaded image URLs when re-rendering.
  // key: url → value: url (acts as a seen-set; img.src is set directly)
  // ================================================================
  const imgSrcCache = new Map();

  // ================================================================
  // INDEXEDDB ITEM CACHE (persist across page loads)
  // ================================================================
  const IDB_NAME = 'adminCache', IDB_STORE = 'items', IDB_VERSION = 1;
  function openDB() {
    return new Promise((res, rej) => {
      const req = indexedDB.open(IDB_NAME, IDB_VERSION);
      req.onupgradeneeded = e => e.target.result.createObjectStore(IDB_STORE, { keyPath: 'id' });
      req.onsuccess = e => res(e.target.result);
      req.onerror = e => rej(e.target.error);
    });
  }
  async function cacheGet() {
    try {
      const idb = await openDB();
      return new Promise((res, rej) => {
        const tx = idb.transaction(IDB_STORE, 'readonly');
        const req = tx.objectStore(IDB_STORE).getAll();
        req.onsuccess = e => res(e.target.result || []);
        req.onerror = e => rej(e.target.error);
      });
    } catch { return []; }
  }
  async function cacheSet(items) {
    try {
      const idb = await openDB();
      const tx = idb.transaction(IDB_STORE, 'readwrite');
      const store = tx.objectStore(IDB_STORE);
      store.clear();
      items.forEach(item => store.put(item));
    } catch (e) { console.warn('cache write failed', e); }
  }

  // ---- DOM refs ----
  const pasteTextEl       = document.getElementById('pasteText');
  const imageFilesEl      = document.getElementById('imageFiles');
  const addMultiBtn       = document.getElementById('addMultiItemBtn');
  const uploadStatus      = document.getElementById('uploadStatus');
  const itemsContainer    = document.getElementById('itemsContainer');
  const refreshBtn        = document.getElementById('refreshList');
  const selectionToolbar  = document.getElementById('selectionToolbar');
  const selectedCountSpan = document.getElementById('selectedCount');
  const editSelectedBtn   = document.getElementById('editSelectedBtn');
  const deleteSelectedBtn = document.getElementById('deleteSelectedBtn');
  const clearSelectionBtn = document.getElementById('clearSelectionBtn');
  const imageModal        = document.getElementById('imageModal');
  const modalImageFiles   = document.getElementById('modalImageFiles');
  const closeModalBtn     = document.getElementById('closeModalBtn');
  const saveModalBtn      = document.getElementById('saveModalBtn');
  // main progress
  const progressWrap      = document.getElementById('progressWrap');
  const progressFill      = document.getElementById('progressFill');
  const progressText      = document.getElementById('progressText');
  const progressPct       = document.getElementById('progressPct');
  const progressSpeed     = document.getElementById('progressSpeed');
  // modal progress
  const modalProgressWrap  = document.getElementById('modalProgressWrap');
  const modalProgressFill  = document.getElementById('modalProgressFill');
  const modalProgressText  = document.getElementById('modalProgressText');
  const modalProgressPct   = document.getElementById('modalProgressPct');
  const modalProgressSpeed = document.getElementById('modalProgressSpeed');

  let currentProductIdForModal = null;
  let currentItems = [];
  let selectedIds  = new Set();

  // ================================================================
  // PROGRESS BAR HELPERS (supports both main & modal bars)
  // ================================================================
  function makeProgressController(wrap, fill, text, pct, speed) {
    let startTime = null;
    let bytesUploaded = 0;
    return {
      show(done, total, bytes) {
        wrap.classList.add('visible');
        if (!startTime) startTime = Date.now();
        const p = total ? Math.round((done / total) * 100) : 0;
        fill.style.width = p + '%';
        text.textContent = `Uploading ${done} of ${total} image${total !== 1 ? 's' : ''}…`;
        pct.textContent  = p + '%';
        if (bytes != null) {
          bytesUploaded += bytes;
          const elapsed = (Date.now() - startTime) / 1000;
          if (elapsed > 0.5) {
            const kbps = Math.round(bytesUploaded / 1024 / elapsed);
            speed.textContent = `⚡ ${kbps} KB/s`;
          }
        }
      },
      hide() {
        wrap.classList.remove('visible');
        fill.style.width = '0%';
        speed.textContent = '';
        startTime = null;
        bytesUploaded = 0;
      }
    };
  }

  const mainProgress  = makeProgressController(progressWrap, progressFill, progressText, progressPct, progressSpeed);
  const modalProgress = makeProgressController(modalProgressWrap, modalProgressFill, modalProgressText, modalProgressPct, modalProgressSpeed);

  // ================================================================
  // IMAGE COMPRESSION via Canvas (speeds up uploads significantly)
  // Max 1200px wide, JPEG quality 0.82
  // ================================================================
  function compressImage(file, maxWidth = 1200, quality = 0.82) {
    return new Promise((resolve) => {
      // Skip compression for tiny files (< 200 KB) or non-JPEG/PNG
      if (file.size < 200 * 1024) { resolve(file); return; }
      const reader = new FileReader();
      reader.onload = e => {
        const img = new Image();
        img.onload = () => {
          const scale = img.width > maxWidth ? maxWidth / img.width : 1;
          const w = Math.round(img.width * scale);
          const h = Math.round(img.height * scale);
          const canvas = document.createElement('canvas');
          canvas.width = w; canvas.height = h;
          const ctx = canvas.getContext('2d');
          ctx.drawImage(img, 0, 0, w, h);
          canvas.toBlob(blob => {
            if (!blob || blob.size >= file.size) { resolve(file); return; } // no benefit
            resolve(new File([blob], file.name.replace(/\.[^.]+$/, '.jpg'), { type: 'image/jpeg' }));
          }, 'image/jpeg', quality);
        };
        img.onerror = () => resolve(file); // fallback
        img.src = e.target.result;
      };
      reader.onerror = () => resolve(file);
      reader.readAsDataURL(file);
    });
  }

  // ================================================================
  // UPLOAD ONE FILE TO IMGBB (with retry on transient failure)
  // ================================================================
  async function uploadToImgBB(file, retries = 2) {
    const compressed = await compressImage(file);
    const formData = new FormData();
    formData.append('image', compressed);
    for (let attempt = 0; attempt <= retries; attempt++) {
      try {
        const response = await fetch(`https://api.imgbb.com/1/upload?key=${imgbbApiKey}`, {
          method: 'POST', body: formData
        });
        const data = await response.json();
        if (!data.success) throw new Error('ImgBB: ' + (data.error?.message || 'unknown'));
        return { url: data.data.url, size: compressed.size };
      } catch (err) {
        if (attempt === retries) throw err;
        await new Promise(r => setTimeout(r, 600 * (attempt + 1))); // back-off
      }
    }
  }

  // ================================================================
  // PARALLEL UPLOAD WITH CONCURRENCY LIMIT (4 at a time)
  // ================================================================
  async function uploadFilesParallel(files, progressCtrl) {
    const fileArr = Array.from(files);
    const total   = fileArr.length;
    let done = 0;
    const errors  = [];
    const results = new Array(total).fill(null);
    const CONCURRENCY = 4;

    progressCtrl.show(0, total, null);

    async function uploadOne(file, idx) {
      try {
        const { url, size } = await uploadToImgBB(file);
        done++;
        progressCtrl.show(done, total, size);
        results[idx] = url;
      } catch (err) {
        done++;
        progressCtrl.show(done, total, 0);
        errors.push(`${file.name}: ${err.message}`);
      }
    }

    // Pool runner
    let i = 0;
    async function runPool() {
      while (i < fileArr.length) {
        const idx = i++;
        await uploadOne(fileArr[idx], idx);
      }
    }
    const workers = Array.from({ length: Math.min(CONCURRENCY, fileArr.length) }, runPool);
    await Promise.all(workers);

    progressCtrl.hide();
    return { urls: results.filter(Boolean), errors };
  }

  // ================================================================
  // PARSE PRODUCT TEXT
  // ================================================================
  function extractProductData(text) {
    const priceMatch    = text.match(/USD\s*([\d.]+)/i);
    const discountMatch = text.match(/(\d+)%/);
    const linkMatch     = text.match(/https?:\/\/\S+/);
    let title = text;
    if (priceMatch?.[0])    title = title.replace(priceMatch[0], '');
    if (discountMatch?.[0]) title = title.replace(discountMatch[0], '');
    if (linkMatch?.[0])     title = title.replace(linkMatch[0], '');
    title = title.replace(/\s+/g, ' ').trim() || 'Unnamed product';
    return {
      title,
      price: priceMatch ? parseFloat(priceMatch[1]) : 0,
      discount: discountMatch ? parseInt(discountMatch[1]) : 0,
      affiliateLink: linkMatch ? linkMatch[0] : ''
    };
  }

  // ================================================================
  // FIRESTORE HELPERS
  // ================================================================
  async function saveItemToFirestore(itemData) {
    return await db.collection('items').add(itemData);
  }
  async function updateItemImages(itemId, newImageUrls) {
    await db.collection('items').doc(itemId).update({
      images: firebase.firestore.FieldValue.arrayUnion(...newImageUrls)
    });
  }

  // ================================================================
  // CREATE PRODUCT HANDLER
  // ================================================================
  addMultiBtn.addEventListener('click', async () => {
    const text  = pasteTextEl.value.trim();
    const files = imageFilesEl.files;
    if (!text)                        return alert('Please paste product text.');
    if (!files || files.length === 0) return alert('Select at least one image.');

    const productBase = extractProductData(text);
    addMultiBtn.disabled = true;
    uploadStatus.textContent = '';

    const { urls: imageUrls, errors: errorMessages } = await uploadFilesParallel(files, mainProgress);
    addMultiBtn.disabled = false;

    if (imageUrls.length === 0) {
      uploadStatus.textContent = '❌ No images uploaded successfully.';
      if (errorMessages.length) alert('Upload failed:\n' + errorMessages.join('\n'));
      return;
    }

    try {
      await saveItemToFirestore({
        ...productBase,
        images: imageUrls,
        mainImage: imageUrls[0],
        createdAt: firebase.firestore.FieldValue.serverTimestamp()
      });
      uploadStatus.textContent = `✅ Product created with ${imageUrls.length} image(s).`;
      pasteTextEl.value  = '';
      imageFilesEl.value = '';
      await loadItems(true);
    } catch (err) {
      console.error(err);
      uploadStatus.textContent = '❌ Failed to save product.';
    }
    if (errorMessages.length) alert('Some uploads failed:\n' + errorMessages.join('\n'));
  });

  // ================================================================
  // LAZY-LOAD WITH IN-MEMORY SRC CACHE
  // If the URL has already been seen in this session, set src directly
  // (avoids IntersectionObserver delay for already-visible images).
  // ================================================================
  const imgObserver = new IntersectionObserver((entries) => {
    entries.forEach(entry => {
      if (entry.isIntersecting) {
        const img = entry.target;
        const src = img.dataset.src;
        if (src) {
          img.src = src;
          imgSrcCache.set(src, src);
          img.removeAttribute('data-src');
          imgObserver.unobserve(img);
        }
      }
    });
  }, { rootMargin: '300px' }); // wider margin = images load sooner

  function attachLazyImg(img) {
    const src = img.dataset.src;
    if (!src) return;
    if (imgSrcCache.has(src)) {
      // Already loaded in this session — set immediately, no observer needed
      img.src = src;
      img.removeAttribute('data-src');
    } else {
      imgObserver.observe(img);
    }
  }

  // ================================================================
  // RENDER ITEMS
  // ================================================================
  function renderItems(items) {
    if (items.length === 0) {
      itemsContainer.innerHTML = `<div style="grid-column:1/-1;text-align:center;padding:50px;color:#7b94a8;">
        <i class="fas fa-box-open" style="font-size:2.5rem;opacity:0.5;"></i><br>No products yet.</div>`;
      return;
    }

    // Build HTML
    let html = '';
    items.forEach(item => {
      const checked    = selectedIds.has(item.id) ? 'checked' : '';
      const images     = item.images || (item.imageUrl ? [item.imageUrl] : []);
      const mainImage  = item.mainImage || images[0] || 'https://via.placeholder.com/260x170?text=No+Image';
      const imageCount = images.length;

      let thumbnails = '';
      images.slice(0, 4).forEach((img, idx) => {
        thumbnails += `<img data-src="${img}" src="" class="thumb lazy-thumb" onclick="changeMainImage('${item.id}',${idx})" title="Image ${idx+1}">`;
      });
      if (images.length > 4) {
        thumbnails += `<span class="thumb" style="background:#f0f4f9;display:inline-flex;align-items:center;justify-content:center;font-size:0.75rem;">+${images.length - 4}</span>`;
      }

      html += `
        <div class="product-card" data-id="${item.id}">
          <div class="card-select">
            <input type="checkbox" class="item-checkbox" data-id="${item.id}" ${checked}>
          </div>
          <img data-src="${mainImage}" src="" class="product-img main-product-img" id="img-${item.id}" loading="lazy">
          <div class="thumbnail-strip">${thumbnails}</div>
          <div class="product-title">${escapeHtml(item.title) || 'untitled'}</div>
          <div class="product-price">USD ${item.price ?? 0} <small>${item.discount ? item.discount + '% off' : ''}</small></div>
          ${item.discount ? `<div class="product-discount">-${item.discount}%</div>` : ''}
          <div class="product-link"><i class="fas fa-link"></i> ${escapeHtml(item.affiliateLink) || 'no link'}</div>
          <div class="card-actions">
            <button class="edit-btn" data-id="${item.id}"><i class="fas fa-edit"></i> Edit</button>
            <button class="add-images-btn" data-id="${item.id}"><i class="fas fa-plus"></i> Add Images</button>
            <button class="delete-single" data-id="${item.id}"><i class="fas fa-trash"></i> Delete</button>
          </div>
          <span class="image-count">${imageCount} image${imageCount !== 1 ? 's' : ''}</span>
        </div>`;
    });

    itemsContainer.innerHTML = html;

    // Attach cached/lazy loading to every lazy image
    document.querySelectorAll('[data-src]').forEach(img => attachLazyImg(img));

    // Event listeners
    document.querySelectorAll('.item-checkbox').forEach(cb => {
      cb.addEventListener('change', e => {
        const id = e.target.dataset.id;
        if (e.target.checked) selectedIds.add(id); else selectedIds.delete(id);
        updateSelectionUI();
      });
    });
    document.querySelectorAll('.edit-btn').forEach(btn =>
      btn.addEventListener('click', () => editSingleItem(btn.dataset.id)));
    document.querySelectorAll('.add-images-btn').forEach(btn =>
      btn.addEventListener('click', () => openAddImagesModal(btn.dataset.id)));
    document.querySelectorAll('.delete-single').forEach(btn =>
      btn.addEventListener('click', () => deleteSingleItem(btn.dataset.id)));
  }

  // ================================================================
  // CHANGE MAIN IMAGE (thumbnail click)
  // ================================================================
  window.changeMainImage = function(productId, imageIndex) {
    const product = currentItems.find(p => p.id === productId);
    if (!product?.images?.[imageIndex]) return;
    const url   = product.images[imageIndex];
    const imgEl = document.getElementById(`img-${productId}`);
    if (imgEl) {
      imgEl.src = url;
      imgSrcCache.set(url, url); // mark as loaded
    }
  };

  // ================================================================
  // LOAD ITEMS: serve cache instantly, refresh from Firestore in bg
  // ================================================================
  async function loadItems(forceRefresh = false) {
    const cached = await cacheGet();
    if (cached.length > 0 && !forceRefresh) {
      currentItems = cached;
      renderItems(cached);
      syncSelectionIds(cached);
      updateSelectionUI();
      // Background refresh
      refreshFromFirestore(false);
    } else {
      if (!forceRefresh) {
        itemsContainer.innerHTML = '<div style="grid-column:1/-1;text-align:center;padding:40px;color:#6f8a9f;">Loading items...</div>';
      }
      await refreshFromFirestore(true);
    }
  }

  async function refreshFromFirestore(updateUI) {
    try {
      const snapshot = await db.collection('items').get();
      const items = [];
      snapshot.forEach(doc => {
        const data = doc.data();
        if (!data.images && data.imageUrl) data.images = [data.imageUrl];
        items.push({ id: doc.id, ...data });
      });
      await cacheSet(items);
      if (updateUI) {
        currentItems = items;
        renderItems(items);
        syncSelectionIds(items);
        updateSelectionUI();
      } else {
        // Only re-render if item set changed
        const oldSig = currentItems.map(i => i.id).sort().join(',');
        const newSig = items.map(i => i.id).sort().join(',');
        if (oldSig !== newSig) {
          currentItems = items;
          renderItems(items);
          syncSelectionIds(items);
          updateSelectionUI();
        }
      }
    } catch (err) {
      console.error('Firestore load error', err);
      if (updateUI) itemsContainer.innerHTML = '<div style="color:red;">Failed to load items.</div>';
    }
  }

  function syncSelectionIds(items) {
    const existingIds = new Set(items.map(i => i.id));
    for (let id of selectedIds) { if (!existingIds.has(id)) selectedIds.delete(id); }
  }

  // ================================================================
  // SELECTION UI
  // ================================================================
  function updateSelectionUI() {
    const count = selectedIds.size;
    selectedCountSpan.innerText = count;
    selectionToolbar.classList.toggle('hidden', count === 0);
    document.querySelectorAll('.item-checkbox').forEach(cb => {
      cb.checked = selectedIds.has(cb.dataset.id);
    });
  }

  clearSelectionBtn.addEventListener('click', () => { selectedIds.clear(); updateSelectionUI(); });

  deleteSelectedBtn.addEventListener('click', async () => {
    if (!selectedIds.size) return;
    if (!confirm(`Delete ${selectedIds.size} item(s)?`)) return;
    await Promise.allSettled([...selectedIds].map(id =>
      db.collection('items').doc(id).delete().catch(e => console.warn(id, e))
    ));
    selectedIds.clear();
    await loadItems(true);
    updateSelectionUI();
  });

  editSelectedBtn.addEventListener('click', () => {
    if (selectedIds.size) editSingleItem(Array.from(selectedIds)[0]);
  });

  // ================================================================
  // EDIT / DELETE SINGLE
  // ================================================================
  async function editSingleItem(id) {
    try {
      const docSnap = await db.collection('items').doc(id).get();
      if (!docSnap.exists) return alert('Item not found');
      const data = docSnap.data();
      const newTitle    = prompt('Edit title:', data.title || '');        if (newTitle === null) return;
      const newPrice    = prompt('Edit price (USD):', data.price || '');  if (newPrice === null) return;
      const newDiscount = prompt('Edit discount % (or 0):', data.discount || '0'); if (newDiscount === null) return;
      const newLink     = prompt('Edit affiliate link:', data.affiliateLink || ''); if (newLink === null) return;
      await db.collection('items').doc(id).update({
        title: newTitle.trim() || 'edited product',
        price: parseFloat(newPrice) || 0,
        discount: parseInt(newDiscount) || 0,
        affiliateLink: newLink.trim(),
        images: data.images || (data.imageUrl ? [data.imageUrl] : []),
        mainImage: data.mainImage || data.images?.[0] || data.imageUrl
      });
      selectedIds.clear();
      await loadItems(true);
    } catch (err) { console.error(err); alert('Error during edit'); }
  }

  async function deleteSingleItem(id) {
    if (!confirm('Delete this item?')) return;
    await db.collection('items').doc(id).delete();
    selectedIds.delete(id);
    await loadItems(true);
    updateSelectionUI();
  }

  // ================================================================
  // MODAL: add images to existing product
  // ================================================================
  function openAddImagesModal(productId) {
    currentProductIdForModal = productId;
    modalImageFiles.value = '';
    imageModal.style.display = 'flex';
  }

  saveModalBtn.addEventListener('click', async () => {
    if (!currentProductIdForModal) return;
    const files = modalImageFiles.files;
    if (!files || files.length === 0) return alert('Select at least one image.');

    saveModalBtn.disabled = true;
    uploadStatus.textContent = '⏳ Uploading additional images…';
    const { urls: imageUrls, errors: errorMessages } = await uploadFilesParallel(files, modalProgress);
    saveModalBtn.disabled = false;

    if (imageUrls.length > 0) {
      await updateItemImages(currentProductIdForModal, imageUrls);
      uploadStatus.textContent = `✅ Added ${imageUrls.length} image(s).`;
      imageModal.style.display = 'none';
      currentProductIdForModal = null;
      await loadItems(true);
    } else {
      uploadStatus.textContent = '❌ Failed to upload images.';
    }
    if (errorMessages.length) alert('Some uploads failed:\n' + errorMessages.join('\n'));
  });

  closeModalBtn.addEventListener('click', () => {
    imageModal.style.display = 'none';
    currentProductIdForModal = null;
  });
  window.addEventListener('click', e => {
    if (e.target === imageModal) { imageModal.style.display = 'none'; currentProductIdForModal = null; }
  });

  // ================================================================
  // MISC
  // ================================================================
  refreshBtn.addEventListener('click', () => loadItems(true));

  function escapeHtml(unsafe) {
    if (!unsafe) return unsafe;
    return unsafe.replace(/[&<>"]/g,
      m => ({ '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;' }[m] || m));
  }

  // Initial load
  loadItems();
})();
</script>
</body>
</html>
